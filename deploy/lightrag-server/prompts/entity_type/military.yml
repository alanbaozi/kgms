entity_types_guidance: |
  你正在处理军事、国防、安全、作战、装备、情报、训练、保障和态势类资料。

  只允许使用以下英文内部实体类型。不要输出中文类型名，不要创造新的实体类型；无法匹配但有检索价值时使用 other。

  - country: 主权国家、准国家政治实体或国家行为体，例如中国、美国、伊朗、俄罗斯、俄国。即使文本中作为地点出现，也优先归为 country。
  - force_unit: 军种、战区、舰队、基地部队、航空兵旅、合成旅、编队、分队、任务编组、指挥所、火力单元等军事力量或作战组织。
  - organization: 非部队组织，例如政府部门、军工企业、研究所、国际组织、媒体、智库、承包商、造船厂、航空工业集团。
  - person: 指挥员、官员、设计师、总师、专家、发言人、作者、观察员等人员。
  - equipment: 武器、平台、系统、传感器、弹药、无人系统、软件系统、舰艇、飞机、车辆、雷达、导弹、火炮、发动机、声纳等装备或装备类别。
  - facility: 军港、机场、空军基地、海军基地、仓库、雷达站、阵地、训练场、船厂、指挥设施、发射阵地等固定设施。
  - location: 国家以下或非政治实体的具体地理位置，例如城市、港口、机场所在城市、海域、空域、岛礁、坐标点、航道、海峡、通道。
  - region: 跨国家或大范围区域，例如中东、欧洲、印太、西太平洋、南海、东海方向、作战区域、战区方向。
  - event: 具有时间、地点、参与方、结果、公开记录或明确上下文的发生事项，例如演习、冲突、战斗、部署、巡逻、试验、事故、公告、服役仪式、编队空中加油训练。
  - action: 事件中或任务中由明确主体执行的具体动作，例如加油、受油、侦察、机动、打击、拦截、部署、保障、巡航、发射、伴飞、转移、撤离。
  - capability: 能力、作战用途或功能，例如制空、反潜、远程打击、电子战、空中加油、预警探测、突防、隐身、续航、指挥控制。
  - indicator: 可作为属性值检索的指标或状态，例如载弹量、最大航速、巡航速度、实用升限、最高飞行高度、航程、作战半径、射程、探测距离、排水量、舷号、数量、战损、风险等级。
  - resource: 兵力、弹药、燃料、补给、经费、频谱、情报资料、后勤资源、备件等资源。
  - time: 明确时间、日期、年份、阶段、窗口期、持续时间，例如设计时间、首飞时间、服役时间、事件发生时间。
  - plan: 作战计划、任务方案、演训方案、应急预案、行动阶段、部署计划、条令方案。
  - document: 报告、命令、通报、条令、新闻稿、网页、表格、图像、地图、附件等资料来源。
  - other: 无法归入上述类别但对检索有价值的概念或对象。

  国家、地区、地点、设施边界：
  - 伊朗、俄国、俄罗斯、美国、中国等国家必须归为 country，不要归为 location。
  - 中东、印太、南海、西太平洋、东海方向等大范围区域归为 region。
  - 霍尔木兹海峡、某海域、某空域、某岛礁、某坐标点归为 location。
  - 赫梅米姆空军基地、阿巴斯港海军基地、某雷达站、某船厂归为 facility。

  装备属性抽取规则：
  - 装备平台本体归为 equipment，例如歼-16、F-16、09III型核潜艇、鹰击-18导弹、运油-20加油机。
  - 装备类别也可归为 equipment，例如战斗机、加油机、核潜艇、反舰导弹、相控阵雷达。
  - 载弹量、最大航速、巡航速度、实用升限、最高飞行高度、航程、作战半径、射程、探测距离、排水量、最大起飞重量等属性值归为 indicator。
  - 设计时间、首飞时间、服役时间、退役时间归为 time。
  - 设计师、总设计师归为 person；设计单位、制造单位、服役部队归为 organization 或 force_unit。
  - 不要只把重要属性写进 description；应尽量用关系把 equipment 连接到 indicator、time、person、organization、force_unit、capability。

  事件和动作抽取规则：
  - event 是发生事项的容器，通常连接时间、地点、参与方、参与装备、结果和来源。
  - action 是 event 内部或任务中的具体动作，必须能连接到执行主体、动作对象、使用装备、地点、时间或所属事件。
  - 静态事实不要默认抽成 action 或 event，例如“服役于”“可搭载”“具备能力”“由某单位设计”。这些优先用关系表达。
  - 只有出现明确发生语境时才抽 event，例如“某日举行演习”“完成试验”“发生事故”“组织编队空中加油训练”。
  - action 名称应包含主体和对象，例如“运油-20加油机为歼-16实施空中加油”“歼-16编队执行远海巡航”。
  - 不要把低价值表达抽成 action，例如“显示”“指出”“包括”“认为”“提到”“报道”“称为”。

  关系 keywords 使用短语，优先从以下军事语义中选择；多个 keywords 用逗号分隔：
  所属国家、隶属、服役于、部署于、驻扎于、位于、活动区域、涉及区域、
  装备分类、型号衍生、设计时间、首飞时间、服役时间、退役时间、设计单位、制造单位、总设计师、
  最大航速、巡航速度、实用升限、最高飞行高度、航程、作战半径、载弹量、最大起飞重量、排水量、射程、探测距离、舷号、数量指标、
  搭载武器、搭载系统、雷达型号、发动机型号、具备能力、能力增强、能力限制、
  发生时间、发生于、参与方、参与装备、组织方、执行主体、动作对象、使用装备、作用目标、属于事件、动作结果、
  指挥、组织、执行、使用、搭载、建造、下水、支援、保障、加油、受油、侦察、监视、巡逻、训练、打击、拦截、发射、协同、撤离、来源、引用。

